<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>TankX</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0f;overflow:hidden;font-family:'Nunito',sans-serif;user-select:none;}
#gameCanvas{display:block;position:fixed;inset:0;cursor:crosshair;}
#ui{position:fixed;inset:0;pointer-events:none;z-index:10;}

/* HUD */
#hpBar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:10px;background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.1);border-radius:50px;padding:8px 18px;}
#hpTrack{width:160px;height:10px;background:rgba(255,255,255,0.1);border-radius:10px;overflow:hidden;}
#hpFill{height:100%;border-radius:10px;background:linear-gradient(90deg,#e74c3c,#ff6b6b);transition:width .15s;}
#hpLabel{font-family:'Fredoka One',cursive;font-size:14px;color:#fff;min-width:32px;text-align:right;}
#ammoWrap{display:flex;gap:4px;align-items:center;}
.ammo-dot{width:8px;height:8px;border-radius:50%;background:#f9ca24;transition:background .1s;}
.ammo-dot.empty{background:rgba(255,255,255,0.15);}
#reloadBar{position:fixed;bottom:58px;left:50%;transform:translateX(-50%);width:180px;height:4px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden;opacity:0;transition:opacity .2s;}
#reloadFill{height:100%;background:#f9ca24;border-radius:4px;width:0%;}

#scoreBoard{position:fixed;top:16px;right:16px;background:rgba(0,0,0,0.65);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:12px 16px;min-width:160px;}
#scoreBoard .sb-title{font-family:'Fredoka One',cursive;font-size:13px;color:#f9ca24;letter-spacing:2px;text-align:center;margin-bottom:8px;}
.sb-row{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:12px;font-weight:800;color:#d4f5e9;border-bottom:1px solid rgba(255,255,255,0.05);}
.sb-row:last-child{border:none;}
.sb-row.me{color:#f9ca24;}
.sb-rank{color:rgba(255,255,255,0.3);width:16px;font-size:11px;}
.sb-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sb-kills{font-family:'Fredoka One',cursive;color:#ff6b6b;}
.tank-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}

#killFeed{position:fixed;top:16px;left:16px;display:flex;flex-direction:column;gap:5px;pointer-events:none;}
.kf-item{background:rgba(0,0,0,0.7);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:5px 10px;font-size:12px;font-weight:800;color:#fff;animation:kfIn .2s ease,kfOut .4s ease 2.5s forwards;white-space:nowrap;}
@keyframes kfIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
@keyframes kfOut{to{opacity:0;transform:translateX(-10px)}}

/* ЭКРАНЫ — плавные переходы */
.screen{
  position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity 0.45s cubic-bezier(0.4,0,0.2,1),
             transform 0.45s cubic-bezier(0.4,0,0.2,1),
             visibility 0s linear 0.45s;
  transform:translateY(20px) scale(0.97);
  visibility:hidden;
}
.screen.active{
  opacity:1;pointer-events:all;
  transform:translateY(0) scale(1);
  visibility:visible;
  transition:opacity 0.45s cubic-bezier(0.4,0,0.2,1),
             transform 0.45s cubic-bezier(0.4,0,0.2,1),
             visibility 0s linear 0s;
}
.screen.out{
  opacity:0;
  transform:translateY(-16px) scale(0.97);
  pointer-events:none;
}

/* ДЫХАНИЕ МЕНЮ */
@keyframes breatheBg{
  0%,100%{background-size:100% 100%;}
  50%{background-size:110% 110%;}
}
@keyframes breatheBtn{
  0%,100%{box-shadow:0 6px 0 #7a5500, 0 10px 30px rgba(249,202,36,0.4);}
  50%{box-shadow:0 6px 0 #7a5500, 0 10px 55px rgba(249,202,36,0.75), 0 0 80px rgba(249,202,36,0.2);}
}
@keyframes breatheInput{
  0%,100%{box-shadow:0 4px 20px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.04);}
  50%{box-shadow:0 4px 32px rgba(249,202,36,0.18),0 0 0 1px rgba(249,202,36,0.12),inset 0 1px 0 rgba(255,255,255,0.06);}
}
#menuScreen{
  background:radial-gradient(ellipse 100% 80% at 50% 0%,#1a1030 0%,#080510 60%,#020208 100%);
  animation:breatheBg 4s ease-in-out infinite;
}
.btn-play-tank{
  background:linear-gradient(180deg,#f9ca24 0%,#e0a800 50%,#c48f00 100%);
  border:none;border-radius:60px;color:#1a0a00;
  font-family:'Fredoka One',cursive;font-size:36px;letter-spacing:3px;
  padding:18px 70px;cursor:pointer;
  animation:breatheBtn 3s ease-in-out infinite;
  transition:transform .1s;margin-top:16px;
}
.btn-play-tank:hover{transform:translateY(-3px);}
.btn-play-tank:active{transform:translateY(3px);}
#nickInput{
  width:100%;background:rgba(255,255,255,0.06);border:2px solid rgba(249,202,36,0.3);
  border-radius:50px;padding:13px 24px;
  font-family:'Fredoka One',cursive;font-size:22px;color:#f9ca24;outline:none;
  letter-spacing:2px;transition:border-color .2s,background .2s,box-shadow .2s;
  animation:breatheInput 4s ease-in-out infinite;
  text-align:center;
}
#nickInput::placeholder{color:rgba(249,202,36,0.25);}
#nickInput:focus{
  border-color:#f9ca24;background:rgba(249,202,36,0.07);
  box-shadow:0 4px 20px rgba(0,0,0,0.4),0 0 0 3px rgba(249,202,36,0.15);
  animation:none;
}

/* КРУЖОК СКИНА (как в Gulper) */
#skinCircleWrap{
  position:fixed;
  bottom:24px;right:24px;
  z-index:60;
  cursor:pointer;
  display:none;
  transition:transform .2s cubic-bezier(0.34,1.4,0.64,1);
}
#skinCircleWrap.visible{ display:block; }
#skinCircleWrap:hover{ transform:scale(1.08); }
#skinCircleCanvas{ display:block; }

/* РАДАР */
#radar{
  position:fixed;bottom:16px;right:16px;
  width:130px;height:130px;
  background:rgba(0,0,0,0.7);
  border:1px solid rgba(249,202,36,0.25);
  border-radius:8px;
  overflow:hidden;
  display:none;
  z-index:20;
  box-shadow:0 0 20px rgba(0,0,0,0.5),inset 0 0 30px rgba(0,0,0,0.3);
}
#radarCanvas{display:block;}
.controls-hint{margin-top:24px;display:flex;gap:16px;flex-wrap:wrap;justify-content:center;}
.hint-item{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:8px 14px;font-size:12px;font-weight:800;color:rgba(255,255,255,0.5);display:flex;align-items:center;gap:6px;}
.hint-key{background:rgba(255,255,255,0.12);border-radius:5px;padding:2px 7px;font-family:'Fredoka One',cursive;font-size:13px;color:#fff;}

/* ЗАГРУЗКА */
#loadingScreen{
  background:radial-gradient(ellipse 140% 120% at 50% 0%,#1a1030 0%,#080510 55%,#020208 100%);
  gap:0;
}
.load-wrap{
  display:flex;flex-direction:column;align-items:center;gap:0;
  width:100%;max-width:480px;padding:0 32px;
}
.load-subtitle{
  font-family:'Fredoka One',cursive;font-size:14px;
  color:rgba(255,255,255,0.25);letter-spacing:6px;margin-top:2px;margin-bottom:40px;
}
.load-bar-outer{
  width:100%;position:relative;
}
.load-percent{
  font-family:'Fredoka One',cursive;font-size:42px;color:#fff;
  text-align:center;margin-bottom:14px;
  text-shadow:0 0 30px rgba(249,202,36,0.6);
  transition:all 0.15s;
}
.load-bar-bg{
  width:100%;height:8px;
  background:rgba(255,255,255,0.07);
  border-radius:20px;overflow:hidden;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,0.06);
}
.load-bar-fill{
  height:100%;width:0%;border-radius:20px;
  background:linear-gradient(90deg,#b8860b,#ffd000,#fff5c0,#ffb300,#ff8c00,#ffd000,#b8860b);
  background-size:300% 100%;
  animation:barShimmer 2s linear infinite;
  box-shadow:0 0 16px rgba(255,180,0,0.6),0 0 32px rgba(255,140,0,0.3);
  transition:width 0.12s linear;
}
@keyframes barShimmer{
  0%{background-position:100% 0}
  100%{background-position:-100% 0}
}
.load-status{
  font-family:'Fredoka One',cursive;font-size:13px;
  color:rgba(255,255,255,0.3);letter-spacing:3px;
  margin-top:14px;text-align:center;text-transform:uppercase;
  min-height:20px;transition:all 0.3s;
}

/* ПЕРЕЛИВАЮЩИЙСЯ ЛОГОТИП — солнечный */
@keyframes sunShift{
  0%   {background-position:0% 50%}
  50%  {background-position:100% 50%}
  100% {background-position:0% 50%}
}
@keyframes sunPulse{
  0%,100%{filter:drop-shadow(0 0 24px rgba(255,200,60,0.5)) drop-shadow(0 0 60px rgba(255,140,0,0.2));}
  50%    {filter:drop-shadow(0 0 55px rgba(255,220,80,0.9)) drop-shadow(0 0 110px rgba(255,160,20,0.4));}
}
.logo-tank{
  font-family:'Fredoka One',cursive;
  font-size:110px;
  line-height:1;
  letter-spacing:4px;
  background:linear-gradient(90deg,
    #fff7d6,
    #ffe066,
    #ffb300,
    #ff8c00,
    #ffe566,
    #ffffff,
    #ffd000,
    #ffb300,
    #ff8c00,
    #ffe066,
    #fff7d6
  );
  background-size:400% 100%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation:sunShift 6s ease-in-out infinite, sunPulse 3s ease-in-out infinite;
}
.load-logo{
  font-family:'Fredoka One',cursive;
  font-size:96px;
  line-height:1;
  letter-spacing:4px;
  background:linear-gradient(90deg,
    #fff7d6,
    #ffe066,
    #ffb300,
    #ff8c00,
    #ffe566,
    #ffffff,
    #ffd000,
    #ffb300,
    #ff8c00,
    #ffe066,
    #fff7d6
  );
  background-size:400% 100%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation:sunShift 6s ease-in-out infinite, sunPulse 3s ease-in-out infinite;
}
.death-title{font-family:'Fredoka One',cursive;font-size:72px;color:#ff4e4e;filter:drop-shadow(0 0 30px #ff4e4e88);}
.death-stats{display:flex;gap:20px;margin:20px 0 30px;flex-wrap:wrap;justify-content:center;}
.ds-card{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:14px 24px;text-align:center;}
.ds-val{font-family:'Fredoka One',cursive;font-size:36px;color:#f9ca24;}
.ds-lbl{font-size:11px;font-weight:800;color:rgba(255,255,255,0.4);letter-spacing:2px;margin-top:2px;}
.btn-restart-tank{background:linear-gradient(135deg,#e74c3c,#ff6b6b);border:none;border-radius:60px;color:#fff;font-family:'Fredoka One',cursive;font-size:28px;padding:15px 58px;cursor:pointer;box-shadow:0 6px 28px rgba(231,76,60,0.5);}
.btn-restart-tank:hover{transform:scale(1.05);}
.btn-menu-tank{background:transparent;border:2px solid rgba(255,255,255,0.2);border-radius:60px;color:#fff;font-family:'Fredoka One',cursive;font-size:18px;padding:11px 36px;cursor:pointer;margin-top:12px;}
.btn-menu-tank:hover{background:rgba(255,255,255,0.08);}

#toastWrap{position:fixed;top:70px;left:50%;transform:translateX(-50%);z-index:90;display:flex;flex-direction:column;align-items:center;gap:6px;pointer-events:none;}
.toast{background:rgba(0,0,0,0.85);border:1px solid rgba(255,255,255,0.15);border-radius:50px;padding:7px 20px;font-family:'Fredoka One',cursive;font-size:15px;color:#fff;animation:toastIn .3s ease,toastOut .4s ease 1.8s forwards;white-space:nowrap;}
@keyframes toastIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{to{opacity:0;transform:translateY(-8px)}}
</style>
</head>
<body>

<!-- МЕНЮ -->
<div id="menuScreen" class="screen active">
  <canvas id="menuStarsCanvas" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;"></canvas>
  <div class="logo-tank" style="position:relative;z-index:1;">TankX</div>
  <div class="nick-wrap" style="position:relative;z-index:1;">
    <div class="nick-input-box">
      <input id="nickInput" maxlength="16" placeholder="Введи ник..." spellcheck="false" autocomplete="off">
    </div>
  </div>
  <button class="btn-play-tank" id="playBtn" style="position:relative;z-index:1;">ИГРАТЬ</button>
</div>

<!-- КРУЖОК СКИНА (как в Gulper) -->
<div id="skinCircleWrap">
  <canvas id="skinCircleCanvas" width="80" height="80"></canvas>
</div>

<!-- ЗАГРУЗКА -->
<div id="loadingScreen" class="screen">
  <div class="load-wrap">
    <div class="load-logo">TankX</div>
    <div class="load-subtitle">TANK ARENA</div>
    <div class="load-bar-outer">
      <div class="load-percent" id="loadPercent">0%</div>
      <div class="load-bar-bg"><div class="load-bar-fill" id="loadBarFill"></div></div>
      <div class="load-status" id="loadStatus">Инициализация...</div>
    </div>
  </div>
</div>

<!-- HUD -->
<div id="ui">
  <div id="hpBar">
    <span style="font-size:16px">❤️</span>
    <div id="hpTrack"><div id="hpFill" style="width:100%"></div></div>
    <span id="hpLabel">100</span>
    <div id="ammoWrap"></div>
  </div>
  <div id="reloadBar"><div id="reloadFill"></div></div>
  <div id="scoreBoard">
    <div class="sb-title">☠️ KILLS</div>
    <div id="sbList"></div>
  </div>
  <div id="killFeed"></div>
</div>

<!-- РАДАР -->
<div id="radar">
  <canvas id="radarCanvas" width="130" height="130"></canvas>
</div>

<!-- СМЕРТЬ -->
<div id="deathScreen" class="screen">
  <div class="death-title">УНИЧТОЖЕН!</div>
  <div class="death-stats">
    <div class="ds-card"><div class="ds-val" id="dsKills">0</div><div class="ds-lbl">УБИЙСТВ</div></div>
    <div class="ds-card"><div class="ds-val" id="dsShots">0</div><div class="ds-lbl">ВЫСТРЕЛОВ</div></div>
    <div class="ds-card"><div class="ds-val" id="dsAccuracy">0%</div><div class="ds-lbl">ТОЧНОСТЬ</div></div>
    <div class="ds-card"><div class="ds-val" id="dsSurvive">0с</div><div class="ds-lbl">ВЫЖИВАНИЕ</div></div>
  </div>
  <button class="btn-restart-tank" id="restartBtn">ЕЩЁ РАЗ!</button>
  <button class="btn-menu-tank" id="menuBtn">ГЛАВНОЕ МЕНЮ</button>
</div>

<div id="toastWrap"></div>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let W, H;
function resize(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
resize(); window.addEventListener('resize', resize);

// ══ КОНСТАНТЫ ══
const WORLD = 3000;
const TILE = 60;
const MAX_HP = 100;
const BULLET_SPEED = 9;
const TANK_SPEED = 2.4;
const TANK_SPEED_BOOST = 3.8;
const MAX_AMMO = 5;
const RELOAD_TIME = 2200; // мс на один патрон
const BULLET_DMG = 28;
const BOT_COUNT = 8;
const RESPAWN_DELAY = 3000;

// Цвета танков
const TANK_COLORS = [
  {body:'#f9ca24',dark:'#c48f00',barrel:'#a07000'},
  {body:'#ff6b9d',dark:'#c0395f',barrel:'#901040'},
  {body:'#00e5cc',dark:'#009988',barrel:'#007060'},
  {body:'#a29bfe',dark:'#6c5ce7',barrel:'#4a3cb0'},
  {body:'#ff9f43',dark:'#c06a10',barrel:'#904800'},
  {body:'#39ff14',dark:'#1a9900',barrel:'#107000'},
  {body:'#ff4e4e',dark:'#b02020',barrel:'#801010'},
  {body:'#4db8ff',dark:'#1a7ac0',barrel:'#0a5090'},
];
const BOT_NAMES = ['Cobra','Viper','Ghost','Shadow','Blaze','Storm','Raven','Titan','Fury','Zeus','Axe','Nova'];

// ══ СОСТОЯНИЕ ИГРЫ ══
let running = false;
let tanks = [];
let bullets = [];
let particles = [];
let walls = [];
let player = null;
let camX = 0, camY = 0;
let mouseX = W/2, mouseY = H/2;
let mouseDown = false;
let keys = {};
let playerKills = 0, playerShots = 0, playerHits = 0;
let startTime = 0;
let animId = null;

// ══ КАРТА ══
const MAP_LAYOUT = (function(){
  // Генерируем стены — симметричная арена с укрытиями
  const map = [];
  const G = Math.floor(WORLD/TILE);
  // Границы
  for(let x=0;x<G;x++){ map.push({x:x*TILE,y:0}); map.push({x:x*TILE,y:(G-1)*TILE}); }
  for(let y=1;y<G-1;y++){ map.push({x:0,y:y*TILE}); map.push({x:(G-1)*TILE,y:y*TILE}); }
  // Внутренние блоки (симметрично)
  const blocks = [
    [5,5],[5,6],[6,5],
    [5,G-6],[5,G-7],[6,G-6],
    [G-6,5],[G-7,5],[G-6,6],
    [G-6,G-6],[G-7,G-6],[G-6,G-7],
    [Math.floor(G/2),Math.floor(G/2)-1],
    [Math.floor(G/2),Math.floor(G/2)],
    [Math.floor(G/2)-1,Math.floor(G/2)],
    [Math.floor(G/2)+1,Math.floor(G/2)],
    [Math.floor(G/2),Math.floor(G/2)+1],
    [10,Math.floor(G/2)],[G-11,Math.floor(G/2)],
    [Math.floor(G/2),10],[Math.floor(G/2),G-11],
    [8,8],[G-9,8],[8,G-9],[G-9,G-9],
    [15,15],[G-16,15],[15,G-16],[G-16,G-16],
  ];
  blocks.forEach(([bx,by])=>map.push({x:bx*TILE,y:by*TILE}));
  return map;
})();

// Быстрый поиск стен
const wallSet = new Set(MAP_LAYOUT.map(w=>w.x+'_'+w.y));
function hasWall(x,y){ return wallSet.has((Math.floor(x/TILE)*TILE)+'_'+(Math.floor(y/TILE)*TILE)); }
function hasWallRect(x,y,r){
  for(let dx=-r;dx<=r;dx+=r) for(let dy=-r;dy<=r;dy+=r) if(hasWall(x+dx,y+dy)) return true;
  return false;
}

// ══ ТАНК ══
function mkTank(x, y, name, colorIdx, isPlayer){
  return {
    x, y, name,
    angle: Math.random()*Math.PI*2,
    turretAngle: 0,
    hp: MAX_HP,
    maxHp: MAX_HP,
    ammo: MAX_AMMO,
    reloading: false,
    reloadStart: 0,
    reloadQueue: 0,
    colorIdx: colorIdx % TANK_COLORS.length,
    isPlayer,
    alive: true,
    kills: 0,
    shots: 0,
    speed: TANK_SPEED,
    vx: 0, vy: 0,
    // Бот
    botTarget: null,
    botShootTimer: 0,
    botMoveTimer: 0,
    botAngle: Math.random()*Math.PI*2,
    botStrafeDir: 1,
    botRespawnAt: 0,
    _deadTime: 0,
  };
}

// Случайная безопасная позиция
function safeSpawn(){
  let x,y,tries=0;
  do{ x=200+Math.random()*(WORLD-400); y=200+Math.random()*(WORLD-400); tries++; }
  while(hasWallRect(x,y,30) && tries<100);
  return {x,y};
}

function initGame(){
  tanks=[]; bullets=[]; particles=[];
  playerKills=0; playerShots=0; playerHits=0;
  startTime=Date.now();
  const sp = safeSpawn();
  player = mkTank(sp.x, sp.y, getPlayerName(), 0, true);
  tanks.push(player);
  for(let i=0;i<BOT_COUNT;i++){
    const s=safeSpawn();
    const bot=mkTank(s.x,s.y,BOT_NAMES[i%BOT_NAMES.length],i+1,false);
    tanks.push(bot);
  }
  camX=player.x-W/2; camY=player.y-H/2;
}

// ══ СТРЕЛЬБА ══
function shoot(tank){
  if(!tank.alive||tank.ammo<=0) return;
  tank.ammo--;
  tank.shots++;
  if(tank.isPlayer) playerShots++;
  const angle = tank.turretAngle;
  const bx = tank.x + Math.cos(angle)*26;
  const by = tank.y + Math.sin(angle)*26;
  bullets.push({
    x:bx, y:by,
    vx:Math.cos(angle)*BULLET_SPEED,
    vy:Math.sin(angle)*BULLET_SPEED,
    owner:tank,
    alive:true,
    bounces:2, // рикошет!
    trail:[],
  });
  // Мигание вспышки
  spawnMuzzleFlash(bx,by,angle,tank.colorIdx);
  // Начать перезарядку одного патрона
  if(!tank.reloading){
    tank.reloading=true;
    tank.reloadStart=Date.now();
  } else {
    tank.reloadQueue++;
  }
}

function updateReload(tank){
  if(!tank.reloading) return;
  const elapsed = Date.now()-tank.reloadStart;
  if(elapsed>=RELOAD_TIME){
    tank.ammo=Math.min(MAX_AMMO,tank.ammo+1);
    if(tank.ammo<MAX_AMMO||tank.reloadQueue>0){
      tank.reloadQueue=Math.max(0,tank.reloadQueue-1);
      tank.reloadStart=Date.now();
    } else {
      tank.reloading=false;
    }
  }
}

// ══ ЧАСТИЦЫ ══
// Следы гусениц
let trackMarks = [];

function spawnTrack(tank){
  if(!tank.alive) return;
  // Две точки — левая и правая гусеница
  const a = tank.angle;
  const nx = Math.cos(a+Math.PI/2)*14;
  const ny = Math.sin(a+Math.PI/2)*14;
  trackMarks.push({x:tank.x+nx, y:tank.y+ny, angle:a, alpha:0.55, w:6, h:3});
  trackMarks.push({x:tank.x-nx, y:tank.y-ny, angle:a, alpha:0.55, w:6, h:3});
  // Пыль
  for(let i=0;i<2;i++){
    const da = a+Math.PI+(Math.random()-.5)*0.8;
    particles.push({
      x:tank.x+(Math.random()-.5)*10, y:tank.y+(Math.random()-.5)*10,
      vx:Math.cos(da)*0.5, vy:Math.sin(da)*0.5-0.3,
      r:4+Math.random()*4, alpha:0.35, decay:0.018,
      type:'dust'
    });
  }
}

function updateTrackMarks(){
  for(let i=trackMarks.length-1;i>=0;i--){
    trackMarks[i].alpha -= 0.003;
    if(trackMarks[i].alpha<=0) trackMarks.splice(i,1);
  }
}

function drawTrackMarks(){
  for(const t of trackMarks){
    const px=t.x-camX, py=t.y-camY;
    if(px<-20||px>W+20||py<-20||py>H+20) continue;
    ctx.save();
    ctx.globalAlpha=t.alpha;
    ctx.translate(px,py);
    ctx.rotate(t.angle);
    ctx.fillStyle='rgba(0,0,0,0.6)';
    ctx.fillRect(-t.w/2,-t.h/2,t.w,t.h);
    ctx.restore();
  }
  ctx.globalAlpha=1;
}

function spawnExplosion(x,y,color,count=18){
  // Огненное кольцо
  particles.push({
    x,y, vx:0,vy:0,
    r:4, maxR:55+Math.random()*20,
    color, alpha:0.8, decay:0.035,
    type:'ring'
  });
  // Второе кольцо чуть позже и меньше
  particles.push({
    x,y, vx:0,vy:0,
    r:2, maxR:30+Math.random()*15,
    color:'#ff8800', alpha:0.6, decay:0.045,
    type:'ring'
  });
  // Искры
  for(let i=0;i<count;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=2+Math.random()*6;
    particles.push({
      x,y,
      vx:Math.cos(angle)*speed,
      vy:Math.sin(angle)*speed,
      r:2+Math.random()*4,
      color: Math.random()<0.5 ? color : '#ff8800',
      alpha:1,
      decay:0.025+Math.random()*0.02,
      type:'spark'
    });
  }
  // Дым который поднимается
  for(let i=0;i<10;i++){
    const angle=Math.random()*Math.PI*2;
    particles.push({
      x:x+(Math.random()-.5)*18, y:y+(Math.random()-.5)*18,
      vx:Math.cos(angle)*0.4+(Math.random()-.5)*0.5,
      vy:Math.sin(angle)*0.4-0.8-Math.random()*0.6,
      r:10+Math.random()*18,
      alpha:0.65, decay:0.008+Math.random()*0.006,
      type:'smoke'
    });
  }
}

function spawnMuzzleFlash(x,y,angle,ci){
  const c = TANK_COLORS[ci%TANK_COLORS.length];
  // Звезда вспышки
  for(let i=0;i<8;i++){
    const a=angle+(Math.random()-.5)*0.7;
    const spd=4+Math.random()*5;
    particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,r:2+Math.random()*3,color:'#fff8c0',alpha:1,decay:0.1,type:'spark'});
  }
  // Кольцо вспышки
  particles.push({x,y,vx:0,vy:0,r:3,maxR:22,color:'#ffe066',alpha:0.7,decay:0.12,type:'ring'});
}

function spawnHitSpark(x,y){
  // Яркий сноп при рикошете
  for(let i=0;i<12;i++){
    const a=Math.random()*Math.PI*2;
    const spd=2+Math.random()*5;
    particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,r:1.5+Math.random()*2.5,
      color:Math.random()<0.6?'#fff8a0':'#ff9900',alpha:1,decay:0.06+Math.random()*0.04,type:'spark'});
  }
  // Маленькое кольцо
  particles.push({x,y,vx:0,vy:0,r:2,maxR:18,color:'#ffcc00',alpha:0.5,decay:0.1,type:'ring'});
}

// ══ БОТ ИИ ══
function updateBot(bot, dt){
  if(!bot.alive){
    if(Date.now()>=bot.botRespawnAt){
      const s=safeSpawn();
      bot.x=s.x; bot.y=s.y;
      bot.hp=MAX_HP; bot.ammo=MAX_AMMO;
      bot.alive=true; bot.reloading=false;
    }
    return;
  }

  // Выбираем цель — ближайший живой танк
  let nearest=null, nearDist=Infinity;
  for(const t of tanks){
    if(t===bot||!t.alive) continue;
    const d=Math.hypot(t.x-bot.x,t.y-bot.y);
    if(d<nearDist){nearDist=d;nearest=t;}
  }
  bot.botTarget=nearest;

  bot.botMoveTimer-=dt;
  bot.botShootTimer-=dt;

  if(nearest){
    const toTarget=Math.atan2(nearest.y-bot.y,nearest.x-bot.x);
    bot.turretAngle=toTarget;

    // Движение: преследование + уклонение
    if(bot.botMoveTimer<=0){
      bot.botMoveTimer=600+Math.random()*800;
      if(nearDist>300){
        // Идём к цели с небольшим зигзагом
        bot.botAngle=toTarget+(Math.random()-.5)*0.6;
      } else {
        // Страфим вокруг цели
        bot.botStrafeDir*=Math.random()<0.3?-1:1;
        bot.botAngle=toTarget+Math.PI/2*bot.botStrafeDir+(Math.random()-.5)*0.4;
      }
    }

    // Стрельба если цель в прицеле и нет стены между нами
    if(bot.botShootTimer<=0 && bot.ammo>0 && nearDist<600){
      const angleDiff=Math.abs(((toTarget-bot.turretAngle)+Math.PI*3)%(Math.PI*2)-Math.PI);
      if(angleDiff<0.15){
        shoot(bot);
        bot.botShootTimer=400+Math.random()*600;
      }
    }
  } else {
    // Бродим
    if(bot.botMoveTimer<=0){
      bot.botMoveTimer=1000+Math.random()*1500;
      bot.botAngle=Math.random()*Math.PI*2;
    }
    bot.turretAngle=bot.botAngle;
  }

  // Двигаемся плавно
  const spd = bot.hp < 40 ? TANK_SPEED_BOOST : TANK_SPEED;

  // Плавный поворот корпуса
  let da = bot.botAngle - bot.angle;
  while(da >  Math.PI) da -= Math.PI*2;
  while(da < -Math.PI) da += Math.PI*2;
  bot.angle += da * 0.12;

  let nx=bot.x+Math.cos(bot.angle)*spd;
  let ny=bot.y+Math.sin(bot.angle)*spd;
  if(hasWallRect(nx,ny,18)||nx<50||nx>WORLD-50||ny<50||ny>WORLD-50){
    bot.botAngle+=Math.PI/2+Math.random()*Math.PI;
    bot.botMoveTimer=0;
  } else {
    bot.x=nx; bot.y=ny;
  }

  updateReload(bot);
}

// ══ ИГРОК ══
function updatePlayer(dt){
  if(!player.alive) return;

  // Поворот башни к мыши
  player.turretAngle=Math.atan2((mouseY+camY)-player.y,(mouseX+camX)-player.x);

  // Движение WASD / стрелки
  let dx=0,dy=0;
  if(keys['ArrowUp']||keys['KeyW']||keys['Ц']||keys['ц']) dy=-1;
  if(keys['ArrowDown']||keys['KeyS']||keys['Ы']||keys['ы']) dy=1;
  if(keys['ArrowLeft']||keys['KeyA']||keys['Ф']||keys['ф']) dx=-1;
  if(keys['ArrowRight']||keys['KeyD']||keys['В']||keys['в']) dx=1;

  if(dx||dy){
    const targetAngle = Math.atan2(dy,dx);

    // Плавный поворот корпуса — находим кратчайший путь
    let da = targetAngle - player.angle;
    while(da >  Math.PI) da -= Math.PI*2;
    while(da < -Math.PI) da += Math.PI*2;
    player.angle += da * 0.18; // скорость поворота

    const spd=TANK_SPEED+(keys['ShiftLeft']?1:0);
    const nx=player.x+Math.cos(player.angle)*spd;
    const ny=player.y+Math.sin(player.angle)*spd;
    if(!hasWallRect(nx,player.y,18)&&nx>50&&nx<WORLD-50) player.x=nx;
    if(!hasWallRect(player.x,ny,18)&&ny>50&&ny<WORLD-50) player.y=ny;
  }

  // Стрельба удержанием ЛКМ
  if(mouseDown && player.ammo>0 && !player._shootCooldown){
    shoot(player);
    player._shootCooldown=180;
  }
  if(player._shootCooldown) player._shootCooldown=Math.max(0,player._shootCooldown-dt);

  // Ручная перезарядка R
  if(keys['KeyR']||keys['К']||keys['к']){
    if(!player.reloading&&player.ammo<MAX_AMMO){
      player.reloading=true;
      player.reloadStart=Date.now();
    }
  }

  updateReload(player);

  // Камера плавно следует за игроком
  camX+=(player.x-W/2-camX)*0.1;
  camY+=(player.y-H/2-camY)*0.1;
}

// ══ ПУЛИ ══
function updateBullets(){
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    if(!b.alive){bullets.splice(i,1);continue;}

    // Трейл
    b.trail.push({x:b.x,y:b.y});
    if(b.trail.length>8) b.trail.shift();

    b.x+=b.vx; b.y+=b.vy;

    // Стены
    const wallX=hasWall(b.x,b.y);
    if(wallX||b.x<10||b.x>WORLD-10||b.y<10||b.y>WORLD-10){
      if(b.bounces>0){
        // Рикошет
        if(hasWall(b.x-b.vx,b.y)||b.x<10||b.x>WORLD-10) b.vx*=-1;
        else b.vy*=-1;
        b.bounces--;
        spawnHitSpark(b.x,b.y);
        b.x+=b.vx; b.y+=b.vy;
      } else {
        spawnExplosion(b.x,b.y,'#ffdd00',8);
        b.alive=false;
      }
      continue;
    }

    // Попадание в танки
    for(const t of tanks){
      if(t===b.owner||!t.alive) continue;
      if(Math.hypot(t.x-b.x,t.y-b.y)<22){
        const tCol = t.customColor ? t.customColor.body : TANK_COLORS[t.colorIdx].body;
        const oCol = b.owner.customColor ? b.owner.customColor.body : TANK_COLORS[b.owner.colorIdx].body;
        const pCol = player.customColor ? player.customColor.body : TANK_COLORS[0].body;
        t.hp-=BULLET_DMG;
        spawnExplosion(b.x,b.y,tCol,12);
        b.alive=false;
        if(b.owner.isPlayer) playerHits++;
        if(t.hp<=0){
          t.alive=false;
          t._deadTime=Date.now();
          spawnExplosion(t.x,t.y,tCol,30);
          spawnExplosion(t.x,t.y,'#ff4400',20);
          b.owner.kills++;
          if(b.owner.isPlayer){
            playerKills++;
            addKillFeed('ты', t.name, pCol, tCol);
            showToast('💥 +1 убийство!','#ff6b6b');
          } else if(t.isPlayer){
            addKillFeed(b.owner.name, 'тебя', oCol, pCol);
          } else {
            addKillFeed(b.owner.name, t.name, oCol, tCol);
          }
          if(!t.isPlayer){
            t.botRespawnAt=Date.now()+RESPAWN_DELAY;
          } else {
            setTimeout(showDeath, 800);
          }
        }
        break;
      }
    }
  }
}

// ══ РИСОВАНИЕ ══
function drawTile(x, y){
  const px=x-camX, py=y-camY;
  if(px<-TILE||px>W||py<-TILE||py>H) return;
  // Блок стены
  ctx.fillStyle='#1a1a2e';
  ctx.fillRect(px,py,TILE,TILE);
  ctx.fillStyle='#252545';
  ctx.fillRect(px+2,py+2,TILE-4,TILE-4);
  ctx.fillStyle='rgba(255,255,255,0.03)';
  ctx.fillRect(px+2,py+2,TILE-4,6);
  ctx.strokeStyle='rgba(162,155,254,0.2)';
  ctx.lineWidth=1;
  ctx.strokeRect(px+0.5,py+0.5,TILE-1,TILE-1);
}

function drawTank(t){
  if(!t.alive) return;
  const px=t.x-camX, py=t.y-camY;
  if(px<-60||px>W+60||py<-60||py>H+60) return;

  // Если есть кастомный HSL цвет — используем его, иначе из массива
  let c;
  if(t.customColor){
    c = t.customColor;
  } else {
    c = TANK_COLORS[t.colorIdx%TANK_COLORS.length];
  }

  ctx.save();
  ctx.translate(px,py);

  // Тень под танком
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(3,3,18,12,0,0,Math.PI*2);
  ctx.fill();

  // Корпус (повёрнут по направлению движения)
  ctx.rotate(t.angle);
  // Гусеницы
  ctx.fillStyle=c.dark;
  ctx.fillRect(-20,-16,40,7);
  ctx.fillRect(-20,9,40,7);
  // Детали гусениц
  ctx.fillStyle='rgba(0,0,0,0.3)';
  for(let i=-18;i<20;i+=8){ctx.fillRect(i,-16,4,7);ctx.fillRect(i,9,4,7);}
  // Корпус
  ctx.fillStyle=c.body;
  ctx.beginPath();
  ctx.roundRect(-16,-10,32,20,4);
  ctx.fill();
  ctx.strokeStyle=c.dark;
  ctx.lineWidth=1.5;
  ctx.stroke();
  // Блик
  ctx.fillStyle='rgba(255,255,255,0.18)';
  ctx.fillRect(-12,-8,20,5);
  ctx.restore();

  // Башня (отдельное вращение)
  ctx.save();
  ctx.translate(px,py);
  ctx.rotate(t.turretAngle);
  // Башня
  ctx.fillStyle=c.body;
  ctx.beginPath();
  ctx.arc(0,0,11,0,Math.PI*2);
  ctx.fill();
  ctx.strokeStyle=c.dark;
  ctx.lineWidth=1.5;
  ctx.stroke();
  // Ствол
  ctx.fillStyle=c.barrel;
  ctx.fillRect(10,-4,22,8);
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.fillRect(10,-4,22,3);
  ctx.restore();

  // HP бар (только если не полный)
  if(t.hp<t.maxHp){
    const bw=40,bh=5;
    const bx=px-bw/2,by=py-30;
    ctx.fillStyle='rgba(0,0,0,0.6)';
    ctx.fillRect(bx,by,bw,bh);
    const hpPct=t.hp/t.maxHp;
    ctx.fillStyle=hpPct>0.5?'#2ecc71':hpPct>0.25?'#f9ca24':'#e74c3c';
    ctx.fillRect(bx,by,bw*hpPct,bh);
  }

  // Имя
  ctx.font=`bold 11px Nunito,sans-serif`;
  ctx.textAlign='center';
  ctx.fillStyle='rgba(0,0,0,0.6)';
  ctx.fillText(t.name,px+1,py-34+1);
  ctx.fillStyle=t.isPlayer?'#f9ca24':'#fff';
  ctx.fillText(t.name,px,py-34);
}

function drawBullet(b){
  if(!b.alive) return;
  const px=b.x-camX, py=b.y-camY;
  const angle=Math.atan2(b.vy,b.vx);
  const spd=Math.hypot(b.vx,b.vy);

  // Огненный трейл
  for(let i=0;i<b.trail.length;i++){
    const tp=b.trail[i];
    const t=i/b.trail.length;
    const tr=5*t;
    // Оранжево-красный огонь
    ctx.beginPath();
    ctx.arc(tp.x-camX,tp.y-camY,tr,0,Math.PI*2);
    ctx.fillStyle=`rgba(${255},${Math.floor(100+80*t)},0,${t*0.6})`;
    ctx.fill();
    // Жёлтое ядро
    if(t>0.5){
      ctx.beginPath();
      ctx.arc(tp.x-camX,tp.y-camY,tr*0.4,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,240,100,${t*0.5})`;
      ctx.fill();
    }
  }

  // Вытянутый снаряд
  ctx.save();
  ctx.translate(px,py);
  ctx.rotate(angle);

  // Свечение вокруг снаряда
  const glow=ctx.createRadialGradient(0,0,0,0,0,10);
  glow.addColorStop(0,'rgba(255,220,50,0.4)');
  glow.addColorStop(1,'rgba(255,100,0,0)');
  ctx.fillStyle=glow;
  ctx.beginPath(); ctx.ellipse(0,0,10,6,0,0,Math.PI*2); ctx.fill();

  // Корпус снаряда — вытянутый
  const bGrad=ctx.createLinearGradient(0,-3,0,3);
  bGrad.addColorStop(0,'#fff8a0');
  bGrad.addColorStop(0.4,'#ffdd00');
  bGrad.addColorStop(1,'#ff8800');
  ctx.fillStyle=bGrad;
  ctx.beginPath(); ctx.ellipse(0,0,7,3,0,0,Math.PI*2); ctx.fill();

  // Блик
  ctx.fillStyle='rgba(255,255,255,0.6)';
  ctx.beginPath(); ctx.ellipse(-1,-0.5,3,1,0,0,Math.PI*2); ctx.fill();

  ctx.restore();
}

function drawParticle(p){
  const px=p.x-camX, py=p.y-camY;
  if(px<-100||px>W+100||py<-100||py>H+100) return;
  ctx.globalAlpha=p.alpha;

  if(p.type==='ring'){
    // Расширяющееся кольцо
    const progress = p.r/p.maxR;
    ctx.beginPath();
    ctx.arc(px,py,p.r,0,Math.PI*2);
    ctx.strokeStyle=p.color;
    ctx.lineWidth=3*(1-progress)+1;
    ctx.stroke();
  } else if(p.type==='smoke'){
    // Дым — серый круг
    const sg=ctx.createRadialGradient(px,py,0,px,py,p.r);
    sg.addColorStop(0,`rgba(80,80,80,${p.alpha*0.5})`);
    sg.addColorStop(1,`rgba(40,40,40,0)`);
    ctx.fillStyle=sg;
    ctx.beginPath(); ctx.arc(px,py,p.r,0,Math.PI*2); ctx.fill();
  } else if(p.type==='dust'){
    // Пыль из-под гусениц
    ctx.fillStyle=`rgba(120,100,60,${p.alpha*0.4})`;
    ctx.beginPath(); ctx.arc(px,py,p.r,0,Math.PI*2); ctx.fill();
  } else {
    // Искра
    ctx.fillStyle=p.color;
    ctx.beginPath();
    ctx.arc(px,py,p.r*p.alpha,0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawBackground(){
  // Тёмная плитка фона
  const tileSize=TILE;
  const startX=Math.floor(camX/tileSize)*tileSize;
  const startY=Math.floor(camY/tileSize)*tileSize;
  for(let x=startX;x<camX+W+tileSize;x+=tileSize){
    for(let y=startY;y<camY+H+tileSize;y+=tileSize){
      const px=x-camX,py=y-camY;
      ctx.fillStyle=(Math.floor(x/tileSize)+Math.floor(y/tileSize))%2===0?'#0d1f0d':'#0f240f';
      ctx.fillRect(px,py,tileSize,tileSize);
    }
  }
  // Тонкая сетка
  ctx.strokeStyle='rgba(255,255,255,0.018)';
  ctx.lineWidth=0.5;
  for(let x=startX;x<camX+W+tileSize;x+=tileSize){
    ctx.beginPath();ctx.moveTo(x-camX,0);ctx.lineTo(x-camX,H);ctx.stroke();
  }
  for(let y=startY;y<camY+H+tileSize;y+=tileSize){
    ctx.beginPath();ctx.moveTo(0,y-camY);ctx.lineTo(W,y-camY);ctx.stroke();
  }
}

function drawCrosshair(){
  const cx=mouseX,cy=mouseY;
  ctx.strokeStyle='rgba(255,80,80,0.8)';
  ctx.lineWidth=1.5;
  const gap=8,len=12;
  ctx.beginPath();
  ctx.moveTo(cx-gap-len,cy);ctx.lineTo(cx-gap,cy);
  ctx.moveTo(cx+gap,cy);ctx.lineTo(cx+gap+len,cy);
  ctx.moveTo(cx,cy-gap-len);ctx.lineTo(cx,cy-gap);
  ctx.moveTo(cx,cy+gap);ctx.lineTo(cx,cy+gap+len);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(cx,cy,gap,0,Math.PI*2);
  ctx.stroke();
}

// ══ HUD обновление ══
function updateHUD(){
  if(!player) return;
  const hp=Math.max(0,player.hp);
  document.getElementById('hpFill').style.width=(hp/MAX_HP*100)+'%';
  document.getElementById('hpLabel').textContent=hp;

  // Цвет HP бара
  const hpEl=document.getElementById('hpFill');
  if(hp>60) hpEl.style.background='linear-gradient(90deg,#2ecc71,#4af078)';
  else if(hp>30) hpEl.style.background='linear-gradient(90deg,#f9ca24,#ffdd00)';
  else hpEl.style.background='linear-gradient(90deg,#e74c3c,#ff6b6b)';

  // Патроны
  const ammoWrap=document.getElementById('ammoWrap');
  ammoWrap.innerHTML='';
  for(let i=0;i<MAX_AMMO;i++){
    const d=document.createElement('div');
    d.className='ammo-dot'+(i>=player.ammo?' empty':'');
    ammoWrap.appendChild(d);
  }

  // Полоска перезарядки
  const rb=document.getElementById('reloadBar');
  const rf=document.getElementById('reloadFill');
  if(player.reloading){
    rb.style.opacity='1';
    const p=Math.min(100,(Date.now()-player.reloadStart)/RELOAD_TIME*100);
    rf.style.width=p+'%';
  } else {
    rb.style.opacity='0';
  }

  // Табло убийств
  const sorted=[...tanks].filter(t=>t.kills>0||t.isPlayer).sort((a,b)=>b.kills-a.kills).slice(0,8);
  if(sorted.length===0) sorted.push(player);
  document.getElementById('sbList').innerHTML=sorted.map((t,i)=>{
    const dotColor = t.customColor ? t.customColor.body : TANK_COLORS[t.colorIdx].body;
    return `
    <div class="sb-row${t.isPlayer?' me':''}">
      <span class="sb-rank">${i+1}</span>
      <div class="tank-dot" style="background:${dotColor}"></div>
      <span class="sb-name">${t.name}</span>
      <span class="sb-kills">${t.kills}</span>
    </div>`;
  }).join('');
}

// ══ ГЛАВНЫЙ ЦИКЛ ══
let lastT=0;
let trackTimer=0;
function loop(ts){
  const dt=Math.min(ts-lastT,50);lastT=ts;
  if(!running){requestAnimationFrame(loop);return;}

  // Обновление
  updatePlayer(dt);
  for(const bot of tanks) if(!bot.isPlayer) updateBot(bot,dt);
  updateBullets();

  // Следы гусениц — спавним при движении
  trackTimer+=dt;
  if(trackTimer>80){
    trackTimer=0;
    for(const t of tanks){
      if(!t.alive) continue;
      const moving = Math.hypot(t.vx||0,t.vy||0)>0.1 ||
        (t.isPlayer && (keys['ArrowUp']||keys['KeyW']||keys['ц']||keys['ArrowDown']||
          keys['KeyS']||keys['ы']||keys['ArrowLeft']||keys['KeyA']||
          keys['ф']||keys['ArrowRight']||keys['KeyD']||keys['в']));
      // Для ботов — если они двигались (угол менялся)
      if(t.isPlayer ? moving : t.alive) spawnTrack(t);
    }
  }

  // Частицы
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    if(p.type==='ring'){
      // Кольцо расширяется
      p.r += (p.maxR - p.r) * 0.15;
      p.alpha -= p.decay;
    } else {
      p.x+=p.vx; p.y+=p.vy;
      p.vx*=0.93; p.vy*=0.93;
      if(p.type==='smoke'||p.type==='dust') p.r*=1.02;
      else p.r*=0.97;
      p.alpha-=p.decay;
    }
    if(p.alpha<=0) particles.splice(i,1);
  }
  updateTrackMarks();

  // Рисование
  ctx.clearRect(0,0,W,H);
  drawBackground();
  drawTrackMarks();
  MAP_LAYOUT.forEach(w=>drawTile(w.x,w.y));
  bullets.forEach(drawBullet);
  particles.forEach(drawParticle);
  tanks.forEach(drawTank);
  if(player&&player.alive) drawCrosshair();
  updateHUD();

  animId=requestAnimationFrame(loop);
}

// ══ ПЛАВНЫЕ ПЕРЕХОДЫ ЭКРАНОВ ══
function switchScreen(hideId, showId, onMid){
  const hide = document.getElementById(hideId);
  const show = document.getElementById(showId);
  if(hide){ hide.classList.add('out'); setTimeout(()=>{ hide.classList.remove('active','out'); }, 420); }
  setTimeout(()=>{ if(onMid) onMid(); show.classList.add('active'); }, hide ? 220 : 0);
}

function showDeath(){
  running=false;
  radarEl.style.display='none';
  // Размываем игровой фон
  canvas.style.transition='filter 0.6s ease';
  canvas.style.filter='blur(8px) brightness(0.5)';
  document.getElementById('dsKills').textContent=playerKills;
  document.getElementById('dsShots').textContent=playerShots;
  const acc=playerShots>0?Math.round(playerHits/playerShots*100):0;
  document.getElementById('dsAccuracy').textContent=acc+'%';
  const survive=Math.round((Date.now()-startTime)/1000);
  document.getElementById('dsSurvive').textContent=survive+'с';
  switchScreen(null,'deathScreen');
}

function startGame(){
  const activeScreen = document.querySelector('.screen.active');
  const fromId = activeScreen ? activeScreen.id : null;
  switchScreen(fromId, 'loadingScreen', null);

  const fill = document.getElementById('loadBarFill');
  const status = document.getElementById('loadStatus');
  const pctEl = document.getElementById('loadPercent');
  const steps = [
    {at:0,   msg:'Инициализация...'},
    {at:20,  msg:'Загрузка карты...'},
    {at:55,  msg:'Размещение танков...'},
    {at:80,  msg:'Почти готово...'},
    {at:97,  msg:'Готово к бою! 💥'},
  ];

  let pct = 0;
  fill.style.width = '0%';
  pctEl.textContent = '0%';
  status.textContent = steps[0].msg;

  const loadInt = setInterval(()=>{
    // Скорость уменьшается к концу — реалистичнее
    const speed = pct < 70 ? 3 + Math.random()*4 : pct < 90 ? 1 + Math.random()*2 : 0.5 + Math.random()*1;
    pct = Math.min(pct + speed, 100);

    fill.style.width = pct + '%';
    pctEl.textContent = Math.floor(pct) + '%';

    // Обновляем статус
    for(let i = steps.length-1; i >= 0; i--){
      if(pct >= steps[i].at){ status.textContent = steps[i].msg; break; }
    }

    if(pct >= 100){
      clearInterval(loadInt);
      fill.style.width = '100%';
      pctEl.textContent = '100%';
      setTimeout(()=>{
        document.querySelectorAll('.screen').forEach(s=>{ s.classList.remove('active','out'); });
        canvas.style.filter='none';
        initGame();
        running = true;
        radarEl.style.display = 'block';
      }, 600);
    }
  }, 40);
}

// ══ КРУЖОК СКИНА СПРАВА (слайдер как в Gulper) ══
let menuSkinIdx = parseInt(localStorage.getItem('tankx_skin')||'0') % TANK_COLORS.length;
let skinHue = menuSkinIdx * (360 / TANK_COLORS.length);
let skinTargetHue = skinHue;
let currentHue = skinHue;
let isSpinning = false;
let spinSpeed = 0;

const skinCircleWrap = document.getElementById('skinCircleWrap');
const skinCircleCv   = document.getElementById('skinCircleCanvas');
const sctx = skinCircleCv.getContext('2d');

const SC = 90;
skinCircleCv.width = SC;
skinCircleCv.height = SC;
const SCX = SC/2, SCY = SC/2;
const RING_R = 38;
const RING_W = 9;
const BALL_R = 26;

let sliderAngle = (skinHue / 360) * Math.PI * 2 - Math.PI/2;
let isDraggingSlider = false;

function drawSkinCircle() {
  if(isSpinning){
    skinTargetHue = (skinTargetHue + spinSpeed) % 360;
    if(!isHoldingBall){
      spinSpeed *= 0.94;
      if(spinSpeed < 0.15){ isSpinning = false; spinSpeed = 0; }
    }
  }

  // Плавная интерполяция
  currentHue += (skinTargetHue - currentHue) * (isSpinning ? 1 : 0.12);
  sliderAngle = (currentHue / 360) * Math.PI * 2 - Math.PI/2;

  sctx.clearRect(0, 0, SC, SC);

  // ── Радужное кольцо ──
  for(let i = 0; i < 360; i++){
    const a1 = (i / 360) * Math.PI * 2 - Math.PI/2;
    const a2 = ((i+1.8) / 360) * Math.PI * 2 - Math.PI/2;
    sctx.beginPath();
    sctx.arc(SCX, SCY, RING_R, a1, a2);
    sctx.strokeStyle = `hsl(${i}, 90%, 55%)`;
    sctx.lineWidth = RING_W;
    sctx.stroke();
  }

  // ── Ползунок ──
  const px = SCX + Math.cos(sliderAngle) * RING_R;
  const py = SCY + Math.sin(sliderAngle) * RING_R;
  sctx.beginPath(); sctx.arc(px, py, 9, 0, Math.PI*2);
  sctx.fillStyle='rgba(0,0,0,0.35)'; sctx.fill();
  sctx.beginPath(); sctx.arc(px, py, 8, 0, Math.PI*2);
  sctx.fillStyle='#fff'; sctx.fill();
  sctx.beginPath(); sctx.arc(px, py, 5.5, 0, Math.PI*2);
  sctx.fillStyle=`hsl(${currentHue},90%,55%)`; sctx.fill();

  // ── Шар (просто круг без пушки) ──
  const glow = sctx.createRadialGradient(SCX,SCY,0,SCX,SCY,BALL_R+6);
  glow.addColorStop(0,`hsla(${currentHue},85%,55%,0.35)`);
  glow.addColorStop(1,'transparent');
  sctx.beginPath(); sctx.arc(SCX,SCY,BALL_R+6,0,Math.PI*2);
  sctx.fillStyle=glow; sctx.fill();

  const grad = sctx.createRadialGradient(SCX-8,SCY-8,2,SCX,SCY,BALL_R);
  grad.addColorStop(0,`hsl(${currentHue},85%,82%)`);
  grad.addColorStop(0.35,`hsl(${currentHue},85%,58%)`);
  grad.addColorStop(1,`hsl(${currentHue},85%,32%)`);
  sctx.beginPath(); sctx.arc(SCX,SCY,BALL_R,0,Math.PI*2);
  sctx.fillStyle=grad; sctx.fill();

  // Блик
  sctx.beginPath(); sctx.arc(SCX-9,SCY-9,BALL_R*0.22,0,Math.PI*2);
  sctx.fillStyle='rgba(255,255,255,0.32)'; sctx.fill();

  // Ближайший скин
  menuSkinIdx = Math.round(currentHue / (360/TANK_COLORS.length)) % TANK_COLORS.length;

  requestAnimationFrame(drawSkinCircle);
}

// ── Перетаскивание по кольцу ──
function getAngle(e){
  const rect = skinCircleCv.getBoundingClientRect();
  const ex = e.touches ? e.touches[0].clientX : e.clientX;
  const ey = e.touches ? e.touches[0].clientY : e.clientY;
  return Math.atan2(ey - (rect.top+rect.height/2), ex - (rect.left+rect.width/2));
}

// ── Клик по шарику — крутится пока держишь ──
let isHoldingBall = false;

skinCircleCv.addEventListener('mousedown', e=>{
  const rect = skinCircleCv.getBoundingClientRect();
  const dx = e.clientX - (rect.left+rect.width/2);
  const dy = e.clientY - (rect.top+rect.height/2);
  const dist = Math.hypot(dx,dy);
  if(dist < BALL_R){
    isHoldingBall = true;
    isSpinning = true;
    spinSpeed = 3;
  } else {
    isDraggingSlider = true;
    skinTargetHue = ((getAngle(e)+Math.PI/2)/(Math.PI*2)*360+360)%360;
  }
});

skinCircleCv.addEventListener('touchstart', e=>{
  e.preventDefault();
  const rect = skinCircleCv.getBoundingClientRect();
  const dx = e.touches[0].clientX - (rect.left+rect.width/2);
  const dy = e.touches[0].clientY - (rect.top+rect.height/2);
  const dist = Math.hypot(dx,dy);
  if(dist < BALL_R){
    isHoldingBall = true;
    isSpinning = true;
    spinSpeed = 3;
  } else {
    isDraggingSlider = true;
    skinTargetHue = ((getAngle(e)+Math.PI/2)/(Math.PI*2)*360+360)%360;
  }
},{passive:false});

window.addEventListener('mousemove', e=>{
  if(isDraggingSlider)
    skinTargetHue = ((getAngle(e)+Math.PI/2)/(Math.PI*2)*360+360)%360;
});
window.addEventListener('touchmove', e=>{
  if(!isDraggingSlider) return;
  e.preventDefault();
  skinTargetHue = ((getAngle(e)+Math.PI/2)/(Math.PI*2)*360+360)%360;
},{passive:false});

window.addEventListener('mouseup', ()=>{
  if(isHoldingBall){ isHoldingBall=false; isSpinning=false; spinSpeed=0; }
  if(isDraggingSlider){ isDraggingSlider=false; localStorage.setItem('tankx_skin',menuSkinIdx); }
});
window.addEventListener('touchend', ()=>{
  if(isHoldingBall){ isHoldingBall=false; isSpinning=false; spinSpeed=0; }
  if(isDraggingSlider){ isDraggingSlider=false; localStorage.setItem('tankx_skin',menuSkinIdx); }
});

// ══ РАДАР ══
const radarEl = document.getElementById('radar');
const radarCv = document.getElementById('radarCanvas');
const rctx = radarCv.getContext('2d');
const RADAR_SIZE = 130;
let radarAngle = 0;

function drawRadar(){
  if(!running || !player || !player.alive) return;
  rctx.clearRect(0,0,RADAR_SIZE,RADAR_SIZE);
  const scale = RADAR_SIZE / WORLD;

  // Фон
  rctx.fillStyle='rgba(0,8,4,0.88)';
  rctx.fillRect(0,0,RADAR_SIZE,RADAR_SIZE);

  // Рамка
  rctx.strokeStyle='rgba(249,202,36,0.25)';
  rctx.lineWidth=1;
  rctx.strokeRect(0.5,0.5,RADAR_SIZE-1,RADAR_SIZE-1);

  // Только танки — точки
  for(const t of tanks){
    if(!t.alive) continue;
    const rx = t.x * scale;
    const ry = t.y * scale;

    if(t.isPlayer){
      const glow = rctx.createRadialGradient(rx,ry,0,rx,ry,8);
      glow.addColorStop(0,'rgba(57,255,20,0.4)');
      glow.addColorStop(1,'rgba(57,255,20,0)');
      rctx.fillStyle=glow;
      rctx.beginPath(); rctx.arc(rx,ry,8,0,Math.PI*2); rctx.fill();
      rctx.beginPath(); rctx.arc(rx,ry,4,0,Math.PI*2);
      rctx.fillStyle='#39ff14'; rctx.fill();
    } else {
      rctx.beginPath(); rctx.arc(rx,ry,3,0,Math.PI*2);
      rctx.fillStyle='rgba(180,180,180,0.7)'; rctx.fill();
    }
  }
}


// ══ РАДАР LOOP (исправлено) ══
function loopWithRadar(){
  drawRadar();
  requestAnimationFrame(loopWithRadar);
}
requestAnimationFrame(loopWithRadar);

// ══ ЗВЁЗДЫ В МЕНЮ ══
(function(){
  const cv = document.getElementById('menuStarsCanvas');
  const cx = cv.getContext('2d');
  const stars = [];
  function resize(){ cv.width=cv.offsetWidth; cv.height=cv.offsetHeight; }
  resize();
  window.addEventListener('resize', resize);

  const STAR_COLORS = [
    [255,255,255],
    [249,202,36],
    [162,155,254],
  ];

  for(let i=0;i<120;i++){
    const col = STAR_COLORS[Math.floor(Math.random()*STAR_COLORS.length)];
    stars.push({
      x: Math.random(),
      y: Math.random(),
      r: 0.4+Math.random()*1.8,
      speed: 0.00008+Math.random()*0.00015,
      alpha: 0.2+Math.random()*0.7,
      twinkleSpeed: 0.01+Math.random()*0.03,
      twinklePhase: Math.random()*Math.PI*2,
      rgb: col,
    });
  }

  function drawStars(){
    if(!cv.width) resize();
    cx.clearRect(0,0,cv.width,cv.height);
    const W=cv.width, H=cv.height;
    for(const s of stars){
      s.twinklePhase += s.twinkleSpeed;
      s.y += s.speed;
      if(s.y>1) s.y=0;
      const twinkle = 0.4+0.6*Math.abs(Math.sin(s.twinklePhase));
      const px=s.x*W, py=s.y*H;
      const [r,g,b] = s.rgb;
      // Свечение
      const grd=cx.createRadialGradient(px,py,0,px,py,s.r*3);
      grd.addColorStop(0,`rgba(${r},${g},${b},${s.alpha*twinkle*0.3})`);
      grd.addColorStop(1,`rgba(${r},${g},${b},0)`);
      cx.fillStyle=grd;
      cx.beginPath(); cx.arc(px,py,s.r*3,0,Math.PI*2); cx.fill();
      // Ядро
      cx.globalAlpha=s.alpha*twinkle;
      cx.fillStyle=`rgb(${r},${g},${b})`;
      cx.beginPath(); cx.arc(px,py,s.r,0,Math.PI*2); cx.fill();
      cx.globalAlpha=1;
    }
    requestAnimationFrame(drawStars);
  }
  drawStars();
})();
